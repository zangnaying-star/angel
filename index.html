<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>angel · 天堂</title>

<style>
body{
    margin:0;
    font-family: "Segoe UI", sans-serif;
    height:100vh;
    overflow:hidden;
    color:white;

    /* 梦幻天空渐变 */
    background: linear-gradient(to bottom, #a1c4fd, #c2e9fb, #e0c3fc);
}

/* 粒子画布 */
#particles{
    position:fixed;
    top:0;
    left:0;
    z-index:0;
}

/* 中央卡片 */
.card{
    position:relative;
    z-index:2;
    max-width:600px;
    margin:15vh auto;
    padding:30px;
    text-align:center;

    background:rgba(255,255,255,0.2);
    border-radius:20px;
    backdrop-filter:blur(15px);
    box-shadow:0 10px 40px rgba(255,255,255,0.3);
}

/* 标题发光呼吸 */
h1{
    font-size:32px;
    margin-bottom:20px;
    animation:glow 3s ease-in-out infinite alternate;
}

@keyframes glow{
    from{
        text-shadow:0 0 10px #fff,0 0 20px #fff;
    }
    to{
        text-shadow:0 0 20px #fff,0 0 40px #ffd6ff;
    }
}

p{
    font-size:16px;
    min-height:40px;
}

/* 按钮 */
button{
    padding:10px 18px;
    margin:5px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    background:rgba(255,255,255,0.4);
    color:white;
    font-weight:bold;
    transition:0.3s;
}

button:hover{
    background:white;
    color:#a1c4fd;
    transform:scale(1.1);
}
</style>
</head>

<body>

<canvas id="particles"></canvas>

<div class="card">
    <h1>😇 angel 的天堂</h1>
    <p id="typing"></p>

    <audio id="bgMusic" loop>
        <source src="After17.mp3" type="audio/mpeg">
    </audio>

    <div>
        <button onclick="playMusic()">🎵 进入天堂</button>
        <button onclick="pauseMusic()">⏸️ 静音</button>
    </div>
</div>

<script>
/* 打字机效果 */
const text="欢迎来到天堂，希望这里能成为你的港湾。愿光永远照耀你 ✨";
let index=0;
function typeEffect(){
    if(index<text.length){
        document.getElementById("typing").innerHTML+=text.charAt(index);
        index++;
        setTimeout(typeEffect,80);
    }
}
typeEffect();

/* 音乐淡入 */
const music=document.getElementById("bgMusic");
function playMusic(){
    music.volume=0;
    music.play().catch(()=>{});
    let fade=setInterval(()=>{
        if(music.volume<0.8){
            music.volume+=0.05;
        }else{
            clearInterval(fade);
        }
    },200);
}
function pauseMusic(){
    music.pause();
}

/* 梦幻粒子 */
const canvas=document.getElementById("particles");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let particles=[];
for(let i=0;i<100;i++){
    particles.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*2+1,
        d:Math.random()*0.5+0.2
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.fillStyle="rgba(255,255,255,0.7)";
    ctx.beginPath();
    particles.forEach(p=>{
        ctx.moveTo(p.x,p.y);
        ctx.arc(p.x,p.y,p.r,0,Math.PI*2,true);
    });
    ctx.fill();
    update();
}

function update(){
    particles.forEach(p=>{
        p.y+=p.d;
        if(p.y>canvas.height){
            p.y=0;
            p.x=Math.random()*canvas.width;
        }
    });
}

setInterval(draw,33);

/* 响应式 */
window.addEventListener("resize",()=>{
    canvas.width=window.innerWidth;
    canvas.height=window.innerHeight;
});
</script>

</body>
</html>
